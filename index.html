<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📸 Photobooth Cute</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Nunito', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #fce4ec 0%, #f3e5f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            touch-action: manipulation;
        }

        /* ===== APP CONTAINER ===== */
        .app {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 42px;
            padding: 20px 16px 24px;
            box-shadow: 0 20px 60px rgba(233, 30, 99, 0.15),
                0 8px 24px rgba(156, 39, 176, 0.10);
            border: 2px solid rgba(255, 255, 255, 0.5);
            position: relative;
            transition: all 0.3s ease;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px 14px 4px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #ec407a, #ab47bc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header h1 span {
            font-size: 26px;
            -webkit-text-fill-color: initial;
            color: #f06292;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .header-actions button {
            background: rgba(255, 255, 255, 0.7);
            border: none;
            border-radius: 30px;
            padding: 8px 14px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .header-actions button:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.9);
        }

        /* ===== CAMERA WRAPPER ===== */
        .camera-wrapper {
            position: relative;
            border-radius: 28px;
            overflow: hidden;
            background: #1a1a2e;
            aspect-ratio: 3/4;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.5),
                0 12px 40px rgba(0, 0, 0, 0.12);
            margin-bottom: 16px;
        }

        .camera-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transform: scaleX(-1);
            /* Mirror effect - soi gương */
        }

        /* Overlay cho timer & trạng thái */
        .camera-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .camera-overlay .countdown {
            font-size: 80px;
            font-weight: 900;
            color: white;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(233, 30, 99, 0.3);
            opacity: 0;
            transition: opacity 0.2s ease;
            font-variant-numeric: tabular-nums;
            background: rgba(0, 0, 0, 0.25);
            padding: 16px 32px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .camera-overlay .countdown.show {
            opacity: 1;
        }

        .camera-overlay .shot-count {
            position: absolute;
            bottom: 14px;
            right: 14px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            padding: 6px 16px;
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .camera-overlay .shot-count span {
            color: #f06292;
            font-size: 18px;
        }

        /* Flash effect */
        .camera-flash {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            border-radius: 28px;
            transition: opacity 0.08s ease;
        }
        .camera-flash.active {
            opacity: 0.7;
        }

        /* ===== TOOLBAR (filter, border, timer, count) ===== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 14px;
            padding: 0 2px;
        }

        .toolbar .group {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.5);
            padding: 3px 8px 3px 6px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            flex-wrap: wrap;
        }

        .toolbar .group label {
            font-size: 12px;
            font-weight: 600;
            color: #7b4a7e;
            margin-right: 2px;
            letter-spacing: 0.3px;
        }

        .toolbar select,
        .toolbar input[type="number"] {
            background: rgba(255, 255, 255, 0.7);
            border: none;
            border-radius: 30px;
            padding: 4px 10px;
            font-size: 13px;
            font-weight: 600;
            color: #4a2c4a;
            outline: none;
            min-width: 50px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-family: inherit;
            appearance: auto;
        }

        .toolbar select option {
            background: white;
            color: #333;
        }

        .toolbar .group .btn-option {
            background: rgba(255, 255, 255, 0.6);
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 13px;
            font-weight: 600;
            color: #4a2c4a;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .toolbar .group .btn-option.active {
            background: #ec407a;
            color: white;
            border-color: #ec407a;
            box-shadow: 0 2px 12px rgba(236, 64, 122, 0.3);
        }

        .toolbar .group .btn-option:active {
            transform: scale(0.92);
        }

        /* ===== CAPTURE BUTTON ===== */
        .capture-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 6px 0 14px 0;
            position: relative;
        }

        .btn-capture {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f06292, #e91e63);
            border: 4px solid white;
            box-shadow: 0 6px 28px rgba(233, 30, 99, 0.35),
                0 0 0 6px rgba(233, 30, 99, 0.10);
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            color: white;
            position: relative;
            touch-action: manipulation;
        }

        .btn-capture:active {
            transform: scale(0.88);
            box-shadow: 0 3px 14px rgba(233, 30, 99, 0.3),
                0 0 0 4px rgba(233, 30, 99, 0.15);
        }

        .btn-capture .inner-ring {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .btn-capture.disabled {
            opacity: 0.5;
            pointer-events: none;
            transform: scale(0.92);
        }

        /* Nút ghép ảnh */
        .btn-merge {
            background: linear-gradient(135deg, #ab47bc, #7b1fa2);
            border: none;
            border-radius: 40px;
            padding: 10px 28px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 20px rgba(123, 31, 162, 0.3);
            cursor: pointer;
            transition: all 0.2s ease;
            display: none;
            align-items: center;
            gap: 8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            touch-action: manipulation;
            white-space: nowrap;
        }

        .btn-merge.show {
            display: flex;
        }

        .btn-merge:active {
            transform: scale(0.92);
        }

        .btn-merge svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* ===== THUMBNAIL PREVIEW ===== */
        .thumbnails {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 56px;
            padding: 4px 0 10px 0;
            align-items: center;
        }

        .thumbnails .thumb-item {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            background: #f3e5f5;
            flex-shrink: 0;
            transition: all 0.2s ease;
            position: relative;
        }

        .thumbnails .thumb-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .thumbnails .thumb-item .badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ec407a;
            color: white;
            font-size: 10px;
            font-weight: 700;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }

        .thumbnails .empty-thumbs {
            font-size: 13px;
            color: #b39ddb;
            font-weight: 500;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        /* ===== LIBRARY ===== */
        .library-toggle {
            display: flex;
            justify-content: center;
            margin-top: 6px;
        }

        .library-toggle button {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            padding: 8px 24px;
            font-size: 15px;
            font-weight: 600;
            color: #6a3e6a;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .library-toggle button:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.85);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }

        .modal-overlay.open {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.94);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            max-width: 400px;
            width: 100%;
            padding: 24px 20px 28px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-card .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: rgba(0, 0, 0, 0.04);
            border: none;
            font-size: 26px;
            cursor: pointer;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            color: #666;
        }

        .modal-card .modal-close:active {
            transform: scale(0.88);
            background: rgba(0, 0, 0, 0.08);
        }

        .modal-card h2 {
            font-size: 22px;
            font-weight: 700;
            color: #4a2c4a;
            margin-bottom: 16px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .modal-card .modal-image-wrap {
            border-radius: 24px;
            overflow: hidden;
            background: #f3e5f5;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            margin-bottom: 18px;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        .modal-card .modal-image-wrap img {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 3/4;
            object-fit: contain;
            background: #faf0fc;
        }

        .modal-card .modal-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .modal-card .modal-actions button {
            flex: 1;
            min-width: 80px;
            padding: 12px 18px;
            border: none;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            touch-action: manipulation;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .modal-card .modal-actions button:active {
            transform: scale(0.92);
        }

        .btn-save {
            background: linear-gradient(135deg, #66bb6a, #43a047);
            color: white;
            box-shadow: 0 4px 16px rgba(76, 175, 80, 0.25);
        }

        .btn-delete {
            background: linear-gradient(135deg, #ef5350, #d32f2f);
            color: white;
            box-shadow: 0 4px 16px rgba(244, 67, 54, 0.25);
        }

        .btn-close-modal {
            background: rgba(0, 0, 0, 0.04);
            color: #555;
        }

        /* ===== LIBRARY GRID ===== */
        .library-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 12px;
            max-height: 340px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .library-grid::-webkit-scrollbar {
            width: 4px;
        }

        .library-grid::-webkit-scrollbar-thumb {
            background: #d1c4e9;
            border-radius: 10px;
        }

        .library-grid .lib-item {
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            background: #f3e5f5;
            aspect-ratio: 3/4;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .library-grid .lib-item:active {
            transform: scale(0.94);
        }

        .library-grid .lib-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .library-grid .lib-item .lib-del {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border: none;
            color: white;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .library-grid .lib-item .lib-del:active {
            transform: scale(0.85);
            background: #d32f2f;
        }

        .library-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            color: #b39ddb;
            font-weight: 500;
            font-size: 16px;
        }

        .library-empty span {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 440px) {
            .app {
                padding: 14px 10px 18px;
                border-radius: 32px;
            }

            .header h1 {
                font-size: 18px;
            }

            .camera-wrapper {
                border-radius: 22px;
                aspect-ratio: 3/4;
            }

            .btn-capture {
                width: 68px;
                height: 68px;
            }
            .btn-capture .inner-ring {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }

            .toolbar .group {
                padding: 2px 6px 2px 4px;
            }
            .toolbar select,
            .toolbar input[type="number"] {
                font-size: 12px;
                padding: 3px 8px;
                min-width: 40px;
            }
            .toolbar .group .btn-option {
                font-size: 12px;
                padding: 3px 10px;
            }

            .modal-card {
                padding: 18px 14px 22px;
                border-radius: 32px;
            }

            .thumbnails .thumb-item {
                width: 44px;
                height: 44px;
            }

            .btn-merge {
                font-size: 14px;
                padding: 8px 20px;
            }

            .library-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
        }

        @media (max-width: 360px) {
            .toolbar .group label {
                font-size: 10px;
            }
            .toolbar select,
            .toolbar input[type="number"] {
                font-size: 11px;
                padding: 2px 6px;
                min-width: 34px;
            }
            .header h1 {
                font-size: 16px;
            }
            .btn-capture {
                width: 60px;
                height: 60px;
            }
            .btn-capture .inner-ring {
                width: 44px;
                height: 44px;
                font-size: 20px;
            }
        }

        /* ===== UTILITY ===== */
        .hidden {
            display: none !important;
        }

        .mt-1 {
            margin-top: 6px;
        }

        .gap-1 {
            gap: 6px;
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Scrollbar mặc định đẹp */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d1c4e9;
            border-radius: 10px;
        }

        /* Nút chụp ảnh từ thư viện (xem ảnh) */
        .modal-image-wrap.border-preview {
            border: 4px solid transparent;
            transition: border-color 0.2s ease;
        }

        /* Các border mẫu */
        .border-solid {
            border-style: solid !important;
        }
        .border-dashed {
            border-style: dashed !important;
        }
        .border-dotted {
            border-style: dotted !important;
        }
        .border-double {
            border-style: double !important;
        }
        .border-groove {
            border-style: groove !important;
        }
        .border-ridge {
            border-style: ridge !important;
        }
    </style>
</head>
<body>

    <div class="app" id="app">

        <!-- ===== HEADER ===== -->
        <div class="header">
            <h1>
                <span>📸</span> Photobooth
            </h1>
            <div class="header-actions">
                <button id="btnLibrary" aria-label="Thư viện">🖼️</button>
                <button id="btnReset" aria-label="Làm mới">🔄</button>
            </div>
        </div>

        <!-- ===== CAMERA ===== -->
        <div class="camera-wrapper" id="cameraWrapper">
            <video id="video" autoplay playsinline muted></video>
            <div class="camera-overlay">
                <div class="countdown" id="countdownDisplay">3</div>
                <div class="shot-count" id="shotCount">
                    📷 <span id="shotCountNum">0</span>
                </div>
            </div>
            <div class="camera-flash" id="cameraFlash"></div>
        </div>

        <!-- ===== TOOLBAR ===== -->
        <div class="toolbar" id="toolbar">
            <!-- Số ảnh ghép -->
            <div class="group">
                <label>🧩</label>
                <select id="photoCountSelect">
                    <option value="2">2</option>
                    <option value="3" selected>3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                </select>
            </div>

            <!-- Filter -->
            <div class="group">
                <label>✨</label>
                <select id="filterSelect">
                    <option value="none">Không</option>
                    <option value="grayscale">Đen trắng</option>
                    <option value="sepia">Sepia</option>
                    <option value="blur(2px)">Mờ</option>
                    <option value="brightness(1.2)">Sáng</option>
                    <option value="contrast(1.3)">Tương phản</option>
                    <option value="hue-rotate(60deg)">Hue</option>
                    <option value="saturate(1.8)">Bão hòa</option>
                    <option value="invert(0.8)">Âm bản</option>
                </select>
            </div>

            <!-- Border -->
            <div class="group">
                <label>🖼️</label>
                <select id="borderSelect">
                    <option value="none">Không</option>
                    <option value="solid 4px #ec407a">Hồng đặc</option>
                    <option value="solid 4px #ab47bc">Tím đặc</option>
                    <option value="solid 4px #42a5f5">Xanh đặc</option>
                    <option value="solid 4px #66bb6a">Xanh lá</option>
                    <option value="dashed 4px #ec407a">Hồng đứt</option>
                    <option value="dotted 4px #ab47bc">Tím chấm</option>
                    <option value="double 4px #ec407a">Hồng đôi</option>
                    <option value="solid 6px #ffb74d">Cam dày</option>
                    <option value="solid 6px #4dd0e1">Xanh dày</option>
                </select>
            </div>

            <!-- Timer -->
            <div class="group">
                <label>⏱️</label>
                <select id="timerSelect">
                    <option value="0">Tắt</option>
                    <option value="3">3s</option>
                    <option value="5">5s</option>
                    <option value="10">10s</option>
                </select>
            </div>
        </div>

        <!-- ===== CAPTURE AREA ===== -->
        <div class="capture-area">
            <button class="btn-capture" id="btnCapture" aria-label="Chụp ảnh">
                <div class="inner-ring">📷</div>
            </button>
            <button class="btn-merge" id="btnMerge">
                <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5v2h14V3zm0 4H5v11c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V7h-2zm-7 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3z"/></svg>
                Ghép ảnh
            </button>
        </div>

        <!-- ===== THUMBNAILS ===== -->
        <div class="thumbnails" id="thumbnails">
            <div class="empty-thumbs">💖 Chụp ảnh để bắt đầu ghép nhé!</div>
        </div>

        <!-- ===== LIBRARY TOGGLE ===== -->
        <div class="library-toggle">
            <button id="btnLibraryToggle">🖼️ Thư viện ảnh</button>
        </div>

    </div>

    <!-- ===== MODAL CHÍNH (xem ảnh / ghép) ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <button class="modal-close" id="modalClose">✕</button>
            <h2 id="modalTitle">📸 Ảnh của bạn</h2>
            <div class="modal-image-wrap" id="modalImageWrap">
                <img id="modalImage" src="" alt="Ảnh">
            </div>
            <div class="modal-actions" id="modalActions">
                <button class="btn-save" id="modalSave">💾 Lưu</button>
                <button class="btn-delete" id="modalDelete">🗑️ Xóa</button>
                <button class="btn-close-modal" id="modalCloseBtn">✕ Đóng</button>
            </div>
        </div>
    </div>

    <!-- ===== MODAL THƯ VIỆN ===== -->
    <div class="modal-overlay" id="libraryOverlay">
        <div class="modal-card">
            <button class="modal-close" id="libraryClose">✕</button>
            <h2>🖼️ Thư viện ảnh</h2>
            <div class="library-grid" id="libraryGrid">
                <div class="library-empty">
                    <span>📭</span>
                    Chưa có ảnh nào<br><small>Hãy chụp vài tấm nhé!</small>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  PHOTOBOOTH — Full JavaScript
        // ============================================================

        (function() {
            'use strict';

            // --- DOM refs ---
            const video = document.getElementById('video');
            const btnCapture = document.getElementById('btnCapture');
            const btnMerge = document.getElementById('btnMerge');
            const btnReset = document.getElementById('btnReset');
            const btnLibrary = document.getElementById('btnLibrary');
            const btnLibraryToggle = document.getElementById('btnLibraryToggle');
            const flash = document.getElementById('cameraFlash');
            const countdownDisplay = document.getElementById('countdownDisplay');
            const shotCountNum = document.getElementById('shotCountNum');
            const thumbnails = document.getElementById('thumbnails');
            const photoCountSelect = document.getElementById('photoCountSelect');
            const filterSelect = document.getElementById('filterSelect');
            const borderSelect = document.getElementById('borderSelect');
            const timerSelect = document.getElementById('timerSelect');

            // Modal chính
            const modalOverlay = document.getElementById('modalOverlay');
            const modalImage = document.getElementById('modalImage');
            const modalTitle = document.getElementById('modalTitle');
            const modalImageWrap = document.getElementById('modalImageWrap');
            const modalSave = document.getElementById('modalSave');
            const modalDelete = document.getElementById('modalDelete');
            const modalClose = document.getElementById('modalClose');
            const modalCloseBtn = document.getElementById('modalCloseBtn');

            // Modal thư viện
            const libraryOverlay = document.getElementById('libraryOverlay');
            const libraryGrid = document.getElementById('libraryGrid');
            const libraryClose = document.getElementById('libraryClose');

            // --- State ---
            let capturedPhotos = []; // mảng dataURL ảnh đã chụp (đã mirror + filter)
            let libraryPhotos = []; // mảng dataURL ảnh đã lưu (cả ảnh đơn và ghép)
            let isCapturing = false;
            let countdownTimer = null;
            let stream = null;
            let currentFilter = 'none';
            let currentBorder = 'none';
            let targetCount = 3; // số ảnh cần ghép
            let timerDelay = 0; // 0 = tắt

            // --- Camera init ---
            async function initCamera() {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 850 } },
                        audio: false
                    });
                    video.srcObject = stream;
                    await video.play();
                    return true;
                } catch (err) {
                    alert('❌ Không thể truy cập camera. Vui lòng cho phép quyền camera và thử lại.');
                    console.error(err);
                    return false;
                }
            }

            // --- Capture một ảnh (lấy từ video, mirror, filter) ---
            function capturePhoto() {
                if (isCapturing) return null;
                if (!video.videoWidth || !video.videoHeight) {
                    alert('📷 Camera chưa sẵn sàng!');
                    return null;
                }

                const width = video.videoWidth;
                const height = video.videoHeight;

                // Tạo canvas tạm để chụp (mirror + filter)
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');

                // Mirror (soi gương)
                ctx.translate(width, 0);
                ctx.scale(-1, 1);

                // Vẽ video
                ctx.drawImage(video, 0, 0, width, height);

                // Áp dụng filter (CSS filter trên canvas)
                const filterVal = filterSelect.value;
                if (filterVal !== 'none') {
                    ctx.filter = filterVal;
                    // Vẽ lại với filter (cách đơn giản: vẽ lại chính nó)
                    // Nhưng filter chỉ áp dụng cho lần vẽ tiếp theo, nên ta vẽ lại từ canvas
                    const imageData = ctx.getImageData(0, 0, width, height);
                    // Cách khác: dùng canvas filter property
                    // Ta sẽ vẽ lại với filter
                    ctx.filter = filterVal;
                    ctx.drawImage(canvas, 0, 0);
                }

                const dataURL = canvas.toDataURL('image/jpeg', 0.92);
                return dataURL;
            }

            // --- Chụp và thêm vào danh sách ---
            async function doCapture() {
                if (isCapturing) return;

                const timerVal = parseInt(timerSelect.value);
                if (timerVal > 0) {
                    // Hẹn giờ
                    await startCountdown(timerVal);
                }

                // Chụp thật
                isCapturing = true;
                btnCapture.classList.add('disabled');

                const photo = capturePhoto();
                if (photo) {
                    capturedPhotos.push(photo);
                    updateThumbnails();
                    updateShotCount();
                    flashEffect();

                    // Kiểm tra đã đủ số ảnh chưa
                    if (capturedPhotos.length >= targetCount) {
                        btnMerge.classList.add('show');
                    } else {
                        btnMerge.classList.remove('show');
                    }
                }

                isCapturing = false;
                btnCapture.classList.remove('disabled');
            }

            // --- Countdown ---
            function startCountdown(seconds) {
                return new Promise((resolve) => {
                    let remaining = seconds;
                    countdownDisplay.textContent = remaining;
                    countdownDisplay.classList.add('show');

                    const interval = setInterval(() => {
                        remaining -= 1;
                        if (remaining <= 0) {
                            clearInterval(interval);
                            countdownDisplay.classList.remove('show');
                            resolve();
                        } else {
                            countdownDisplay.textContent = remaining;
                            // Rung nhẹ
                            countdownDisplay.style.transform = 'scale(1.1)';
                            setTimeout(() => { countdownDisplay.style.transform = 'scale(1)'; }, 100);
                        }
                    }, 1000);

                    // Dừng nếu người dùng bấm chụp lại (hủy) — nhưng đơn giản ta cứ chạy
                });
            }

            // --- Flash ---
            function flashEffect() {
                flash.classList.add('active');
                setTimeout(() => flash.classList.remove('active'), 150);
            }

            // --- Update thumbnails ---
            function updateThumbnails() {
                thumbnails.innerHTML = '';
                if (capturedPhotos.length === 0) {
                    thumbnails.innerHTML = '<div class="empty-thumbs">💖 Chụp ảnh để bắt đầu ghép nhé!</div>';
                    return;
                }
                capturedPhotos.forEach((url, idx) => {
                    const div = document.createElement('div');
                    div.className = 'thumb-item';
                    div.innerHTML = `<img src="${url}" alt="Ảnh ${idx+1}">`;
                    if (capturedPhotos.length > 1) {
                        const badge = document.createElement('div');
                        badge.className = 'badge';
                        badge.textContent = idx + 1;
                        div.appendChild(badge);
                    }
                    thumbnails.appendChild(div);
                });
            }

            function updateShotCount() {
                shotCountNum.textContent = capturedPhotos.length;
            }

            // --- Merge ảnh (ghép dọc) ---
            function mergePhotos() {
                if (capturedPhotos.length < 2) {
                    alert('📸 Cần ít nhất 2 ảnh để ghép!');
                    return;
                }

                const count = capturedPhotos.length;
                const imgElements = [];
                let loadPromises = [];

                // Tải tất cả ảnh vào img
                capturedPhotos.forEach((url) => {
                    const img = new Image();
                    const p = new Promise((resolve) => {
                        img.onload = () => resolve(img);
                        img.onerror = () => resolve(null);
                    });
                    img.src = url;
                    imgElements.push(img);
                    loadPromises.push(p);
                });

                Promise.all(loadPromises).then((imgs) => {
                    const validImgs = imgs.filter(img => img !== null && img.width > 0 && img.height > 0);
                    if (validImgs.length < 2) {
                        alert('⚠️ Không thể tải ảnh để ghép.');
                        return;
                    }

                    // Lấy kích thước: lấy kích thước trung bình hoặc ảnh đầu tiên
                    const baseWidth = validImgs[0].width;
                    const baseHeight = validImgs[0].height;
                    // Chuẩn hóa: tất cả ảnh sẽ có cùng kích thước (lấy max để đẹp)
                    let maxW = 0,
                        maxH = 0;
                    validImgs.forEach(img => { if (img.width > maxW) maxW = img.width; if (img.height > maxH) maxH = img
                            .height; });

                    // Tạo canvas ghép
                    const canvas = document.createElement('canvas');
                    const totalHeight = maxH * validImgs.length;
                    canvas.width = maxW;
                    canvas.height = totalHeight;
                    const ctx = canvas.getContext('2d');

                    // Vẽ từng ảnh
                    validImgs.forEach((img, idx) => {
                        const x = (maxW - img.width) / 2;
                        const y = idx * maxH + (maxH - img.height) / 2;
                        ctx.drawImage(img, x, y, img.width, img.height);
                    });

                    // --- Áp dụng border ---
                    const borderStyle = borderSelect.value;
                    if (borderStyle !== 'none') {
                        // Vẽ border xung quanh canvas
                        // Phân tích border style: "solid 4px #ec407a"
                        const parts = borderStyle.split(' ');
                        const bw = parseInt(parts[1]) || 4;
                        const color = parts[2] || '#ec407a';
                        const style = parts[0] || 'solid';

                        ctx.save();
                        ctx.strokeStyle = color;
                        ctx.lineWidth = bw;
                        ctx.setLineDash([]);
                        if (style === 'dashed') ctx.setLineDash([bw * 2, bw * 1.5]);
                        else if (style === 'dotted') ctx.setLineDash([bw * 0.8, bw * 1.2]);
                        else if (style === 'double') {
                            ctx.lineWidth = bw / 2;
                            ctx.strokeRect(bw / 4, bw / 4, canvas.width - bw / 2, canvas.height - bw / 2);
                            ctx.strokeRect(bw / 4 + bw * 1.5, bw / 4 + bw * 1.5, canvas.width - bw * 1.5 - bw / 4, canvas
                                .height - bw * 1.5 - bw / 4);
                            ctx.restore();
                            // Vẽ thêm border bên ngoài
                            ctx.save();
                            ctx.strokeStyle = color;
                            ctx.lineWidth = bw / 2;
                            ctx.setLineDash([]);
                            ctx.strokeRect(0, 0, canvas.width, canvas.height);
                            ctx.restore();
                            // bỏ qua phần còn lại
                        } else {
                            ctx.strokeRect(bw / 2, bw / 2, canvas.width - bw, canvas.height - bw);
                        }
                        ctx.restore();

                        // Nếu là solid, vẽ thêm 1 lần nữa để đảm bảo
                        if (style === 'solid' || style === 'dashed' || style === 'dotted') {
                            ctx.save();
                            ctx.strokeStyle = color;
                            ctx.lineWidth = bw;
                            if (style === 'dashed') ctx.setLineDash([bw * 2, bw * 1.5]);
                            else if (style === 'dotted') ctx.setLineDash([bw * 0.8, bw * 1.2]);
                            else ctx.setLineDash([]);
                            ctx.strokeRect(bw / 2, bw / 2, canvas.width - bw, canvas.height - bw);
                            ctx.restore();
                        }
                    }

                    const mergedURL = canvas.toDataURL('image/jpeg', 0.92);

                    // Hiển thị modal với ảnh ghép
                    showModal(mergedURL, '🧩 Ảnh ghép', true);
                });
            }

            // --- Show modal ---
            let currentModalDataURL = null;
            let currentModalIsMerged = false;

            function showModal(dataURL, title, isMerged = false) {
                modalImage.src = dataURL;
                modalTitle.textContent = title || '📸 Ảnh của bạn';
                currentModalDataURL = dataURL;
                currentModalIsMerged = isMerged;

                // Xóa border preview cũ
                modalImageWrap.className = 'modal-image-wrap';

                // Áp dụng border preview nếu có
                const borderStyle = borderSelect.value;
                if (borderStyle !== 'none' && isMerged) {
                    modalImageWrap.style.border = borderStyle;
                } else {
                    modalImageWrap.style.border = 'none';
                }

                modalOverlay.classList.add('open');
            }

            function closeModal() {
                modalOverlay.classList.remove('open');
                currentModalDataURL = null;
                currentModalIsMerged = false;
            }

            // --- Lưu ảnh (download) ---
            function savePhoto(dataURL) {
                const link = document.createElement('a');
                link.download = `photobooth_${Date.now()}.jpg`;
                link.href = dataURL;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            // --- Xóa ảnh khỏi thư viện ---
            function deleteFromLibrary(dataURL) {
                const idx = libraryPhotos.indexOf(dataURL);
                if (idx > -1) {
                    libraryPhotos.splice(idx, 1);
                    renderLibrary();
                }
            }

            // --- Thêm vào thư viện (lưu trữ) ---
            function addToLibrary(dataURL) {
                libraryPhotos.push(dataURL);
                renderLibrary();
            }

            // --- Render thư viện ---
            function renderLibrary() {
                libraryGrid.innerHTML = '';
                if (libraryPhotos.length === 0) {
                    libraryGrid.innerHTML = `
                        <div class="library-empty">
                            <span>📭</span>
                            Chưa có ảnh nào<br><small>Hãy chụp và lưu nhé!</small>
                        </div>
                    `;
                    return;
                }

                libraryPhotos.forEach((url, idx) => {
                    const div = document.createElement('div');
                    div.className = 'lib-item';
                    div.innerHTML = `
                        <img src="${url}" alt="Ảnh ${idx+1}" loading="lazy">
                        <button class="lib-del" data-index="${idx}">✕</button>
                    `;
                    // Xem ảnh khi bấm vào
                    div.addEventListener('click', (e) => {
                        if (e.target.classList.contains('lib-del')) return;
                        showModal(url, `🖼️ Ảnh #${idx+1}`, false);
                    });
                    // Xóa
                    const delBtn = div.querySelector('.lib-del');
                    delBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (confirm('🗑️ Xóa ảnh này?')) {
                            deleteFromLibrary(url);
                        }
                    });
                    libraryGrid.appendChild(div);
                });
            }

            // --- Reset ---
            function resetAll() {
                if (capturedPhotos.length > 0) {
                    if (!confirm('🔄 Xóa tất cả ảnh đã chụp?')) return;
                }
                capturedPhotos = [];
                updateThumbnails();
                updateShotCount();
                btnMerge.classList.remove('show');
                // Không reset thư viện
            }

            // --- Sự kiện ---

            // Nút chụp
            btnCapture.addEventListener('click', doCapture);

            // Nút ghép
            btnMerge.addEventListener('click', mergePhotos);

            // Reset
            btnReset.addEventListener('click', resetAll);

            // Mở thư viện
            function openLibrary() {
                renderLibrary();
                libraryOverlay.classList.add('open');
            }

            btnLibrary.addEventListener('click', openLibrary);
            btnLibraryToggle.addEventListener('click', openLibrary);
            libraryClose.addEventListener('click', () => {
                libraryOverlay.classList.remove('open');
            });
            // Đóng thư viện khi click overlay
            libraryOverlay.addEventListener('click', (e) => {
                if (e.target === libraryOverlay) libraryOverlay.classList.remove('open');
            });

            // Modal chính: lưu
            modalSave.addEventListener('click', () => {
                if (currentModalDataURL) {
                    savePhoto(currentModalDataURL);
                    // Thêm vào thư viện nếu chưa có
                    if (!libraryPhotos.includes(currentModalDataURL)) {
                        addToLibrary(currentModalDataURL);
                    }
                }
            });

            // Modal chính: xóa
            modalDelete.addEventListener('click', () => {
                if (currentModalDataURL) {
                    if (confirm('🗑️ Xóa ảnh này?')) {
                        // Xóa khỏi thư viện nếu có
                        deleteFromLibrary(currentModalDataURL);
                        // Nếu là ảnh đang trong capturedPhotos, xóa luôn
                        const idx = capturedPhotos.indexOf(currentModalDataURL);
                        if (idx > -1) {
                            capturedPhotos.splice(idx, 1);
                            updateThumbnails();
                            updateShotCount();
                            if (capturedPhotos.length < 2) btnMerge.classList.remove('show');
                        }
                        closeModal();
                    }
                }
            });

            // Đóng modal
            modalClose.addEventListener('click', closeModal);
            modalCloseBtn.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });

            // --- Thay đổi số ảnh ---
            photoCountSelect.addEventListener('change', (e) => {
                targetCount = parseInt(e.target.value);
                // Nếu số ảnh hiện tại >= target, hiện nút ghép
                if (capturedPhotos.length >= targetCount) {
                    btnMerge.classList.add('show');
                } else {
                    btnMerge.classList.remove('show');
                }
            });

            // --- Filter thay đổi (áp dụng ngay trên video preview?) 
            // Filter sẽ áp dụng khi chụp, không áp dụng trực tiếp lên video để tránh lag
            // Nhưng ta có thể áp dụng filter lên video bằng CSS filter (để preview)
            filterSelect.addEventListener('change', (e) => {
                const val = e.target.value;
                if (val === 'none') {
                    video.style.filter = 'none';
                } else {
                    video.style.filter = val;
                }
            });

            // --- Border thay đổi (lưu lại) ---
            borderSelect.addEventListener('change', (e) => {
                currentBorder = e.target.value;
            });

            // --- Khởi động ---
            async function init() {
                const ok = await initCamera();
                if (!ok) return;
                // Set default filter
                video.style.filter = 'none';
                // Cập nhật targetCount
                targetCount = parseInt(photoCountSelect.value);
                updateThumbnails();
                updateShotCount();
                // Load thư viện từ localStorage nếu có
                try {
                    const saved = localStorage.getItem('photobooth_library');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed)) libraryPhotos = parsed;
                    }
                } catch (e) { /* ignore */ }
                renderLibrary();
            }

            // Lưu thư viện vào localStorage khi có thay đổi
            function saveLibraryToStorage() {
                try {
                    localStorage.setItem('photobooth_library', JSON.stringify(libraryPhotos));
                } catch (e) { /* ignore */ }
            }

            // Ghi đè addToLibrary và deleteFromLibrary để lưu
            const origAdd = addToLibrary;
            addToLibrary = function(url) {
                origAdd(url);
                saveLibraryToStorage();
            };
            const origDelete = deleteFromLibrary;
            deleteFromLibrary = function(url) {
                origDelete(url);
                saveLibraryToStorage();
            };

            // Khởi động
            init();

            // Xử lý khi thoát trang: lưu thư viện
            window.addEventListener('beforeunload', saveLibraryToStorage);

            // ===== PHỤ: Xóa ảnh trong captured bằng cách bấm vào thumbnail (xóa từng ảnh) =====
            // Thêm chức năng xóa ảnh khi bấm giữ vào thumbnail
            thumbnails.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const item = e.target.closest('.thumb-item');
                if (!item) return;
                const idx = Array.from(thumbnails.children).indexOf(item);
                if (idx > -1 && idx < capturedPhotos.length) {
                    if (confirm(`🗑️ Xóa ảnh #${idx+1}?`)) {
                        capturedPhotos.splice(idx, 1);
                        updateThumbnails();
                        updateShotCount();
                        if (capturedPhotos.length < 2) btnMerge.classList.remove('show');
                    }
                }
            });

            // Hỗ trợ xóa bằng nút xóa trên bàn phím (cho desktop)
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (modalOverlay.classList.contains('open')) closeModal();
                    if (libraryOverlay.classList.contains('open')) libraryOverlay.classList.remove('open');
                }
                if (e.key === 'Enter' && !modalOverlay.classList.contains('open') && !libraryOverlay.classList
                    .contains('open')) {
                    doCapture();
                }
            });

            console.log('📸 Photobooth Cute đã sẵn sàng!');
            console.log('💡 Bấm giữ vào thumbnail để xóa ảnh riêng lẻ.');
            console.log('💡 Phím ESC đóng modal, Enter chụp ảnh.');

        })();
    </script>

</body>
